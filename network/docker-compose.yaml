version: '3.7'

networks:
  trustid:
    name: trustid_network

volumes:
  orderer.trustid.com:
  peer0.dbs.trustid.com:
  peer0.grab.trustid.com:
  peer0.singtel.trustid.com:
  peer0.singpass.trustid.com:
  couchdb.dbs:
  couchdb.grab:
  couchdb.singtel:
  couchdb.singpass:

services:

  orderer.trustid.com:
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=orderer.trustid.com:9443
    volumes:
      - ./organizations/ordererOrganizations/trustid.com/orderers/orderer.trustid.com/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/trustid.com/orderers/orderer.trustid.com/tls:/var/hyperledger/orderer/tls
      - orderer.trustid.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    networks:
      - trustid

  couchdb.dbs:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    volumes:
      - couchdb.dbs:/opt/couchdb/data
    networks:
      - trustid

  peer0.dbs.trustid.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=trustid_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.dbs.trustid.com
      - CORE_PEER_ADDRESS=peer0.dbs.trustid.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.dbs.trustid.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.dbs.trustid.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.dbs.trustid.com:7051
      - CORE_PEER_LOCALMSPID=DBSMSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.dbs.trustid.com:9444
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.dbs:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/dbs.trustid.com/peers/peer0.dbs.trustid.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/dbs.trustid.com/peers/peer0.dbs.trustid.com/tls:/etc/hyperledger/fabric/tls
      - peer0.dbs.trustid.com:/var/hyperledger/production
    ports:
      - 7051:7051
      - 9444:9444
    networks:
      - trustid
    depends_on:
      - couchdb.dbs

  couchdb.grab:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 7984:5984
    volumes:
      - couchdb.grab:/opt/couchdb/data
    networks:
      - trustid

  peer0.grab.trustid.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=trustid_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.grab.trustid.com
      - CORE_PEER_ADDRESS=peer0.grab.trustid.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.grab.trustid.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.grab.trustid.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.grab.trustid.com:8051
      - CORE_PEER_LOCALMSPID=GrabMSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.grab.trustid.com:9445
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.grab:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/grab.trustid.com/peers/peer0.grab.trustid.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/grab.trustid.com/peers/peer0.grab.trustid.com/tls:/etc/hyperledger/fabric/tls
      - peer0.grab.trustid.com:/var/hyperledger/production
    ports:
      - 8051:8051
      - 9445:9445
    networks:
      - trustid
    depends_on:
      - couchdb.grab

  couchdb.singtel:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 8984:5984
    volumes:
      - couchdb.singtel:/opt/couchdb/data
    networks:
      - trustid

  peer0.singtel.trustid.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=trustid_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.singtel.trustid.com
      - CORE_PEER_ADDRESS=peer0.singtel.trustid.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.singtel.trustid.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.singtel.trustid.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.singtel.trustid.com:9051
      - CORE_PEER_LOCALMSPID=SingtelMSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.singtel.trustid.com:9446
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.singtel:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/singtel.trustid.com/peers/peer0.singtel.trustid.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/singtel.trustid.com/peers/peer0.singtel.trustid.com/tls:/etc/hyperledger/fabric/tls
      - peer0.singtel.trustid.com:/var/hyperledger/production
    ports:
      - 9051:9051
      - 9446:9446
    networks:
      - trustid
    depends_on:
      - couchdb.singtel

  couchdb.singpass:
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 9984:5984
    volumes:
      - couchdb.singpass:/opt/couchdb/data
    networks:
      - trustid

  peer0.singpass.trustid.com:
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=trustid_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.singpass.trustid.com
      - CORE_PEER_ADDRESS=peer0.singpass.trustid.com:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.singpass.trustid.com:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.singpass.trustid.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.singpass.trustid.com:10051
      - CORE_PEER_LOCALMSPID=SingpassMSP
      - CORE_OPERATIONS_LISTENADDRESS=peer0.singpass.trustid.com:9447
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.singpass:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/singpass.trustid.com/peers/peer0.singpass.trustid.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/singpass.trustid.com/peers/peer0.singpass.trustid.com/tls:/etc/hyperledger/fabric/tls
      - peer0.singpass.trustid.com:/var/hyperledger/production
    ports:
      - 10051:10051
      - 9447:9447
    networks:
      - trustid
    depends_on:
      - couchdb.singpass
